name: harness-python

on:
  push:
    branches: [master]
    paths:
      - "harness/python/**"
      - "spec/schema/**"
      - ".github/workflows/harness-python.yml"
  pull_request:
    paths:
      - "harness/python/**"
      - "spec/schema/**"
      - ".github/workflows/harness-python.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e harness/python[dev]
      - name: Self-check
        run: python -m agentbridge.protocol --self-check
      - name: Pytest
        run: pytest harness/python/tests -q
