name: conformance

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "spec/**"
      - "adapters/**"
      - ".github/workflows/conformance.yml"

jobs:
  schema-self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - run: pip install jsonschema
      - run: cd harness/python && python -m agentbridge.protocol --self-check

  godot-conformance:
    runs-on: ubuntu-latest
    needs: schema-self-check
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.6.2 headless
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip -q godot.zip
          mv Godot_v4.6.2-stable_linux.x86_64 godot
          chmod +x godot
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - name: Boot Godot adapter
        run: |
          export AGENTBRIDGE=1
          export AGENTBRIDGE_PORT=7777
          ./godot --path adapters/godot/examples/minimal_godot_project --headless res://main.tscn &
          GODOT_PID=$!
          echo $GODOT_PID > godot.pid
          sleep 5
      - name: Run conformance suite
        run: |
          TOKEN_FILE="$HOME/.local/share/godot/app_userdata/AgentBridge Minimal/agentbridge.token"
          python spec/conformance/conformance_suite.py \
            --no-launch --port 7777 \
            --token-file "$TOKEN_FILE" \
            --adapter-name godot --adapter-version 0.1.0 \
            --report adapters/godot/conformance-godot-0.1.0.md
      - name: Tear down Godot
        if: always()
        run: kill $(cat godot.pid) || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-report-godot
          path: adapters/godot/conformance-godot-0.1.0.md
